<!DOCTYPE html>
<html>
<head>
    <title>Office Modular Pro - System SOC</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #0f0; pointer-events: none; }
        #chat-overlay { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 300px; background: rgba(10, 10, 10, 0.95); border: 2px solid #0f0; color: #0f0; flex-direction: column; padding: 10px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); z-index: 100; }
        #chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; }
        #chat-input-area { display: flex; border-top: 1px solid #0f0; padding-top: 10px; }
        #chat-input { background: transparent; border: none; color: #fff; flex-grow: 1; outline: none; font-family: inherit; }
        #send-btn { background: #0f0; color: #000; border: none; padding: 5px 10px; margin-left: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <b>SISTEMA DE COMANDO</b><br>
        WASD: Mover | E: Abrir Terminal<br>
        <span id="status" style="color: yellow;">NPC: Autônomo Ativo</span>
    </div>

    <div id="chat-overlay">
        <div id="chat-messages"><div class="msg pc-msg">SISTEMA: Terminal pronto. Digite sua mensagem.</div></div>
        <div id="chat-input-area">
            <span>> </span>
            <input type="text" id="chat-input" placeholder="Conversar com o PC..." autocomplete="off">
            <button id="send-btn">Enviar</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { Player } from './js/Player.js';
        import { World } from './js/World.js';
        import { NPC } from './js/NPC.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 150);
        light.position.set(2, 5, 2);
        light.castShadow = true;
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));

        // Inicialização dos mundos e entidades
        const world = new World(scene, camera, toggleChat);
        const player = new Player(scene, world);
        const npc = new NPC(scene);

        const keys = {};
        let isChatOpen = false;
        
        // Comandos do NPC (IA controla aqui)
        let npcCommands = { forward: false, backward: false, left: false, right: false, jump: false };

        const chatOverlay = document.getElementById('chat-overlay');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const statusEl = document.getElementById('status');

        function toggleChat(show) {
            isChatOpen = show;
            chatOverlay.style.display = show ? "flex" : "none";
            if (show) { chatInput.focus(); Object.keys(keys).forEach(k => keys[k] = false); }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            div.innerText = className === 'user-msg' ? `VOCÊ: ${text}` : `PC: ${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // --- 1. LÓGICA DO TERMINAL (PC) ---
        async function sendChatMessage(text) {
            if (!text.trim()) return;
            addMessage(text, 'user-msg');
            chatInput.value = "";
            addMessage("Acessando rede...", 'pc-msg');

            try {
                const response = await fetch("https://citations-positions-properties-weather.trycloudflare.com/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "openai/gpt-4o-mini",
                        messages: [
                            { role: "system", content: "Você é um terminal cyberpunk. Responda de forma curta e técnica." },
                            { role: "user", content: text }
                        ]
                    })
                });

                const data = await response.json();
                const aiMessage = data.choices?.[0]?.message?.content || "Sem dados.";
                chatMessages.lastChild.innerText = `PC: ${aiMessage}`;
                
                world.interactiveObjects.pc.material.emissive.setHex(0x00ff00);
                world.interactiveObjects.pc.material.emissiveIntensity = 5;
            } catch (e) {
                chatMessages.lastChild.innerText = "PC: ERRO DE PROTOCOLO.";
            }
        }

        // --- 2. LÓGICA DO NPC (INTELIGÊNCIA AUTÔNOMA) ---
        async function runNPCBrain() {
            try {
                statusEl.innerText = "NPC: Planejando (Lote)...";

                const response = await fetch("https://citations-positions-properties-weather.trycloudflare.com/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "openai/gpt-4o-mini",
                        messages: [
                            { 
                                role: "system", 
                                content: "Você é o cérebro de um NPC. Responda APENAS com um JSON contendo uma lista de 10 movimentos aleatórios e variados para explorar o escritório. " +
                                        "Cada movimento deve ter uma duração entre 500 e 2000ms. " +
                                        "Formato: {\"actions\": [{\"forward\":bool, \"backward\":bool, \"left\":bool, \"right\":bool, \"jump\":bool, \"duration\":ms}, ...]}" 
                            },
                            { role: "user", content: "Gere o plano de 10 movimentos agora." }
                        ]
                    })
                });

                const data = await response.json();
                const content = data.choices[0].message.content;
                const jsonMatch = content.match(/\{[\s\S]*\}/);
                
                if (jsonMatch) {
                    const result = JSON.parse(jsonMatch[0]);
                    const actions = result.actions; // Lista de 10 comandos

                    addMessage(`NPC recebeu plano de ${actions.length} movimentos.`, 'pc-msg');

                    // --- LOOP DE EXECUÇÃO DO LOTE ---
                    for (let i = 0; i < actions.length; i++) {
                        const action = actions[i];
                        
                        // Aplica o comando atual da lista
                        npcCommands = { ...action };
                        statusEl.innerText = `NPC: Ação ${i+1}/10`;

                        // Converte duração se a IA mandou em segundos
                        let duration = action.duration > 20 ? action.duration : action.duration * 1000;

                        // Espera a execução da ação atual
                        await new Promise(r => setTimeout(r, duration));

                        // Reset curto entre ações para o movimento não ficar "colado" e parecer mais natural
                        npcCommands = { forward: false, backward: false, left: false, right: false, jump: false };
                        await new Promise(r => setTimeout(r, 200)); 
                    }
                }
            } catch (e) {
                console.error("Erro NPC Batch:", e);
                statusEl.innerText = "NPC: Erro de Rede";
            } finally {
                // Garantia de parada total ao fim do lote
                npcCommands = { forward: false, backward: false, left: false, right: false, jump: false };
                statusEl.innerText = "NPC: Ocioso";
                
                // Espera 5 segundos antes de pedir o próximo lote de 10
                setTimeout(runNPCBrain, 5000);
            }
        }

        // Inicia autonomia
        runNPCBrain();

        // Eventos de teclado
        window.addEventListener("keydown", (e) => {
            if (isChatOpen) {
                if (e.key === "Escape") toggleChat(false);
                if (e.key === "Enter") sendChatMessage(chatInput.value);
                return;
            }
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === "e") {
                const dist = player.group.position.distanceTo(world.interactiveObjects.pc.position);
                if (dist < 3) toggleChat(true);
            }
        });

        window.addEventListener("keyup", (e) => { if (!isChatOpen) keys[e.key.toLowerCase()] = false; });
        document.getElementById('send-btn').addEventListener('click', () => sendChatMessage(chatInput.value));

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            if (!isChatOpen) player.update(delta, keys, world.obstacles);
            
            // O NPC se move baseado no cérebro autônomo
            npc.update(delta, npcCommands, world.obstacles);

            // Câmera Follow
            const head = player.group.position.clone().add(new THREE.Vector3(0, 1.8, 0));
            camera.position.lerp(new THREE.Vector3(0, 2.5, -4.5).applyMatrix4(player.group.matrixWorld), 0.1);
            camera.lookAt(head);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
