<!DOCTYPE html>
<html>
<head>
    <title>Office Modular Pro - Chat System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* HUD Principal */
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; border: 1px solid #0f0; pointer-events: none; }
        
        /* Overlay do Chat */
        #chat-overlay { 
            display: none; /* Escondido por padrão */
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 400px; height: 300px; 
            background: rgba(10, 10, 10, 0.95); 
            border: 2px solid #0f0; 
            color: #0f0; 
            flex-direction: column;
            padding: 10px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        #chat-messages { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; font-size: 14px; }
        .msg { margin-bottom: 8px; }
        .user-msg { color: #fff; }
        .pc-msg { color: #0f0; }

        #chat-input-area { display: flex; border-top: 1px solid #0f0; padding-top: 10px; }
        #chat-input { 
            background: transparent; border: none; color: #fff; 
            flex-grow: 1; outline: none; font-family: inherit; 
        }
        #chat-input::placeholder { color: #050; }
    </style>
</head>
<body>
    <div id="ui">
        <b>CONTROLES</b><br>
        WASD: Mover | ESPAÇO: Pular<br>
        E: Interagir com PC
    </div>

    <div id="chat-overlay">
        <div id="chat-messages">
            <div class="msg pc-msg">SISTEMA: Conexão estabelecida. Aguardando comando...</div>
        </div>
        <div id="chat-input-area">
            <span>> </span>
            <input type="text" id="chat-input" placeholder="Digite sua mensagem..." autocomplete="off">
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { Player } from './js/Player.js';
        import { World } from './js/World.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 100);
        light.position.set(2, 5, 2);
        light.castShadow = true;
        scene.add(light, new THREE.AmbientLight(0xffffff, 0.4));

        const world = new World(scene);
        const player = new Player(scene);
        const keys = {};
        let isChatOpen = false;

        // --- LÓGICA DE INTERAÇÃO E CHAT ---
        const chatOverlay = document.getElementById('chat-overlay');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        function toggleChat(show) {
            isChatOpen = show;
            chatOverlay.style.display = show ? 'flex' : 'none';
            if (show) {
                chatInput.focus();
                // Limpa as teclas para o player parar de andar
                Object.keys(keys).forEach(k => keys[k] = false);
            }
        }

        async function sendChatMessage(text) {
            // Adiciona mensagem do usuário
            addMessage(text, 'user-msg');
            chatInput.value = '';

            // Simulação de Request para API
            addMessage("Processando...", 'pc-msg');
            
            // --- MOCK API REQUEST ---
            // Substitua por: const response = await fetch('SUA_URL_AQUI', { method: 'POST', ... });
            const mockApi = (query) => new Promise(resolve => 
                setTimeout(() => resolve(`RESPOSTA API (200 OK): Recebi seu comando "${query}". Sistema operando nominalmente.`), 1000)
            );

            try {
                const response = await mockApi(text);
                // Remove o "Processando..." e coloca a resposta real
                chatMessages.lastChild.innerText = `PC: ${response}`;
                
                // Feedback visual no objeto 3D
                world.interactiveObjects.pc.material.emissive.setHex(0x00ff00);
                world.interactiveObjects.pc.material.emissiveIntensity = 5;
            } catch (e) {
                addMessage("ERRO: Falha na comunicação com o servidor.", 'pc-msg');
            }
        }

        function addMessage(text, className) {
            const div = document.createElement('div');
            div.className = `msg ${className}`;
            div.innerText = className === 'user-msg' ? `VOCÊ: ${text}` : `PC: ${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Listeners de Teclado
        window.addEventListener('keydown', (e) => {
            if (isChatOpen) {
                if (e.key === 'Escape') toggleChat(false);
                if (e.key === 'Enter' && chatInput.value.trim() !== '') {
                    sendChatMessage(chatInput.value.trim());
                }
                return; // Bloqueia controles do jogo se chat aberto
            }

            keys[e.key.toLowerCase()] = true;
            
            if (e.key.toLowerCase() === 'e') {
                const dist = player.group.position.distanceTo(world.interactiveObjects.pc.position);
                if (dist < 2.5) {
                    toggleChat(true);
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            if (!isChatOpen) keys[e.key.toLowerCase()] = false;
        });

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // Só atualiza o player se o chat estiver fechado
            if (!isChatOpen) {
                player.update(delta, keys, world.obstacles);
            }

            // Câmera Follow
            const playerHead = player.group.position.clone().add(new THREE.Vector3(0, 1.6, 0));
            const idealOffset = new THREE.Vector3(0, 2.5, -4).applyMatrix4(player.group.matrixWorld);
            const rayDir = new THREE.Vector3().subVectors(idealOffset, playerHead).normalize();
            const raycaster = new THREE.Raycaster(playerHead, rayDir, 0, playerHead.distanceTo(idealOffset));
            const intersects = raycaster.intersectObjects(scene.children, true);
            let camPos = idealOffset;
            const hit = intersects.find(i => i.object !== player.group && !player.group.children.includes(i.object));
            if (hit) camPos = hit.point.clone().sub(rayDir.multiplyScalar(0.2));

            camera.position.lerp(camPos, 0.1);
            camera.lookAt(playerHead);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
